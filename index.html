<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZ Eats — Restaurant Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1410; --paper: #faf7f2; --warm: #f2ece0;
    --border: #e0d8cc; --muted: #9a8f82; --accent: #c0392b;
    --accent2: #e67e22; --good: #27ae60; --surface: #fff; --r: 10px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  header { background: var(--ink); color: var(--paper); padding: 2rem 1.5rem 1.5rem; text-align: center; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 2.8rem; letter-spacing: -0.02em; }
  header h1 em { font-style: italic; color: var(--accent2); }
  header p { margin-top: 0.4rem; color: #a09080; font-size: 0.9rem; }

  .search-panel {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .search-row { max-width: 920px; margin: 0 auto; display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; }
  .field input, .field select {
    background: var(--warm); border: 1px solid var(--border); border-radius: var(--r);
    padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: var(--ink); outline: none; transition: border-color 0.2s; appearance: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }
  .field-location { flex: 2; min-width: 200px; position: relative; }
  .field-radius { flex: 0 0 110px; }
  .field-cuisine { flex: 1; min-width: 130px; }
  .field-sort { flex: 1; min-width: 130px; }

  .suggestions {
    display: none; position: absolute; top: 100%; left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    z-index: 999; margin-top: 4px; overflow: hidden;
  }
  .suggestion-item {
    padding: 10px 14px; font-size: 14px; cursor: pointer;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
    display: flex; align-items: center; gap: 8px;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--warm); }
  .suggestion-item .s-icon { color: var(--muted); font-size: 12px; }

  .btn-search {
    background: var(--accent); color: white; border: none; border-radius: var(--r);
    padding: 9px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    font-weight: 600; cursor: pointer; white-space: nowrap; align-self: flex-end;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-search:hover { background: #a93226; }
  .btn-search:active { transform: scale(0.97); }
  .btn-search:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-locate {
    background: var(--warm); color: var(--ink); border: 1px solid var(--border);
    border-radius: var(--r); padding: 9px 14px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; cursor: pointer; white-space: nowrap; align-self: flex-end;
    transition: border-color 0.2s, background 0.2s;
  }
  .btn-locate:hover { border-color: var(--accent); background: #fde8e6; }
  .btn-locate.loading-gps { opacity: 0.6; cursor: not-allowed; }

  .filters-bar { max-width: 920px; margin: 0.75rem auto 0; display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-chip {
    display: flex; align-items: center; gap: 5px; background: var(--warm);
    border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px;
    font-size: 12px; cursor: pointer; transition: all 0.15s; user-select: none; color: var(--muted);
  }
  .filter-chip input[type=checkbox] { display: none; }
  .filter-chip.active { background: var(--ink); border-color: var(--ink); color: white; }
  .filter-chip:hover:not(.active) { border-color: var(--ink); color: var(--ink); }

  .main { max-width: 920px; margin: 0 auto; padding: 1.5rem; }

  .error-msg {
    background: #fdecea; border: 1px solid #f5c2c0; border-radius: var(--r);
    padding: 1rem 1.25rem; color: #c0392b; font-size: 14px; display: none; margin-bottom: 1rem;
  }
  .error-msg.visible { display: block; }

  .loading { display: none; text-align: center; padding: 4rem 0; color: var(--muted); }
  .loading.visible { display: block; }
  .loading-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 1rem; }
  .loading-dots span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    animation: bounce 1s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-8px); opacity: 1; } }

  .empty { display: none; text-align: center; padding: 3rem 0; color: var(--muted); }
  .empty.visible { display: block; }
  .empty h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--ink); margin: 0.5rem 0; }

  .hero-empty { text-align: center; padding: 4rem 1rem; }
  .hero-empty h2 { font-family: 'DM Serif Display', serif; font-size: 2rem; margin-bottom: 0.5rem; }
  .hero-empty p { color: var(--muted); }
  .hero-suggestions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 1.5rem; }
  .hero-chip {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 7px 16px; font-size: 14px; cursor: pointer; transition: all 0.15s;
  }
  .hero-chip:hover { border-color: var(--accent); color: var(--accent); }

  .status-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .status-bar .count { font-size: 14px; color: var(--muted); }
  .status-bar .count strong { color: var(--ink); }

  .restaurant-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
    padding: 1rem 1.25rem; display: flex; gap: 1rem; align-items: flex-start;
    transition: box-shadow 0.15s, transform 0.15s; margin-bottom: 8px;
    cursor: pointer; text-decoration: none; color: inherit;
  }
  .restaurant-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }

  .card-rank { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--border); min-width: 26px; line-height: 1; padding-top: 3px; }
  .card-body { flex: 1; min-width: 0; }
  .card-top { display: flex; align-items: flex-start; gap: 8px; justify-content: space-between; flex-wrap: wrap; }
  .card-name { font-family: 'DM Serif Display', serif; font-size: 1.1rem; line-height: 1.25; }
  .card-rating {
    display: flex; align-items: center; gap: 3px; padding: 2px 8px;
    border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; flex-shrink: 0;
  }
  .card-rating.high { background: var(--good); color: white; }
  .card-rating.mid { background: var(--accent2); color: white; }
  .card-rating.low { background: var(--muted); color: white; }
  .card-rating.none { background: var(--border); color: var(--muted); }
  .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 4px; font-size: 13px; color: var(--muted); }
  .card-meta .sep { color: var(--border); }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .tag { border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 500; border: 1px solid; }
  .tag-open       { background:#e3f2fd; color:#1565c0; border-color:#90caf9; }
  .tag-closed     { background:#fdecea; color:#c0392b; border-color:#f5c2c0; }
  .tag-price      { background:var(--warm); color:var(--ink); border-color:var(--border); }
  .tag-alcohol    { background:#fff3e0; color:#e67e22; border-color:#f0c080; }
  .tag-bar        { background:#f3e5f5; color:#8e44ad; border-color:#d7b8e8; }
  .tag-reserve    { background:#e8f5e9; color:#27ae60; border-color:#a8d8b0; }
  .tag-vegan      { background:#e8f5e9; color:#2e7d32; border-color:#a8d8b0; }
  .tag-vegetarian { background:#f1f8e9; color:#558b2f; border-color:#c5e1a5; }
  .tag-outdoor    { background:#e0f7fa; color:#00838f; border-color:#80deea; }
  .tag-delivery   { background:#fce4ec; color:#c2185b; border-color:#f48fb1; }
  .tag-takeaway   { background:#fff8e1; color:#f57f17; border-color:#ffe082; }
  .tag-wifi       { background:#e8eaf6; color:#3949ab; border-color:#9fa8da; }
  .tag-parking    { background:#efebe9; color:#5d4037; border-color:#bcaaa4; }
  .tag-live       { background:#fce4ec; color:#ad1457; border-color:#f48fb1; }
  .tag-gluten     { background:#f9fbe7; color:#827717; border-color:#e6ee9c; }
  .card-dist { font-size: 12px; color: var(--muted); white-space: nowrap; padding-top: 3px; min-width: 48px; text-align: right; flex-shrink: 0; }

  @media (max-width: 600px) {
    header h1 { font-size: 2rem; }
    .card-rank { display: none; }
    .field-radius { flex: 0 0 88px; }
  }
</style>
</head>
<body>

<header>
  <h1>NZ <em>Eats</em></h1>
  <p>Find restaurants anywhere in Aotearoa</p>
</header>

<div class="search-panel">
  <div class="search-row">
    <div class="field field-location">
      <label>Location</label>
      <input type="text" id="locationInput" placeholder="Auckland CBD, Queenstown, Ponsonby…" autocomplete="off">
      <div class="suggestions" id="suggestions"></div>
    </div>
    <div class="field field-radius">
      <label>Radius</label>
      <select id="radiusSelect">
        <option value="250">250m</option>
        <option value="500">500m</option>
        <option value="1000" selected>1 km</option>
        <option value="2000">2 km</option>
        <option value="3000">3 km</option>
        <option value="5000">5 km</option>
        <option value="10000">10 km</option>
        <option value="15000">15 km</option>
        <option value="25000">25 km</option>
        <option value="50000">50 km</option>
        <option value="75000">75 km</option>
        <option value="100000">100 km</option>
      </select>
    </div>
    <div class="field field-cuisine">
      <label>Cuisine</label>
      <select id="cuisineSelect">
        <option value="">Any cuisine</option>
        <option value="13065">🍽️ Restaurant</option>
        <option value="13064">☕ Café</option>
        <option value="13145">🍣 Japanese / Sushi</option>
        <option value="13236">🍕 Pizza</option>
        <option value="13099">🍔 Burgers</option>
        <option value="13132">🌮 Mexican</option>
        <option value="13072">🍜 Chinese</option>
        <option value="13199">🫕 Indian</option>
        <option value="13276">🍱 Thai</option>
        <option value="13114">🥙 Middle Eastern</option>
        <option value="13049">🥩 Steakhouse</option>
        <option value="13084">🐟 Seafood</option>
        <option value="13025">🍺 Bar / Pub</option>
        <option value="13032">🍳 Brunch</option>
      </select>
    </div>
    <div class="field field-sort">
      <label>Sort by</label>
      <select id="sortSelect" onchange="applyFiltersAndSort()">
        <option value="distance">Nearest first</option>
        <option value="rating">Highest rated</option>
        <option value="name">A → Z</option>
      </select>
    </div>
    <button class="btn-locate" id="gpsBtn" onclick="useGPS()">📍 GPS</button>
    <button class="btn-search" id="searchBtn" onclick="doSearch()">Search</button>
  </div>

  <div class="filters-bar">
    <label class="filter-chip" id="chip-open"><input type="checkbox" id="filter-open" onchange="applyFiltersAndSort()">✅ Open now</label>
    <label class="filter-chip" id="chip-alcohol"><input type="checkbox" id="filter-alcohol" onchange="applyFiltersAndSort()">🍷 Alcohol</label>
    <label class="filter-chip" id="chip-bar"><input type="checkbox" id="filter-bar" onchange="applyFiltersAndSort()">🍺 Bar</label>
    <label class="filter-chip" id="chip-reservations"><input type="checkbox" id="filter-reservations" onchange="applyFiltersAndSort()">📅 Reservations</label>
    <label class="filter-chip" id="chip-vegan"><input type="checkbox" id="filter-vegan" onchange="applyFiltersAndSort()">🌱 Vegan</label>
    <label class="filter-chip" id="chip-vegetarian"><input type="checkbox" id="filter-vegetarian" onchange="applyFiltersAndSort()">🥦 Vegetarian</label>
    <label class="filter-chip" id="chip-outdoor"><input type="checkbox" id="filter-outdoor" onchange="applyFiltersAndSort()">🌿 Outdoor seating</label>
    <label class="filter-chip" id="chip-delivery"><input type="checkbox" id="filter-delivery" onchange="applyFiltersAndSort()">🛵 Delivery</label>
    <label class="filter-chip" id="chip-takeaway"><input type="checkbox" id="filter-takeaway" onchange="applyFiltersAndSort()">🥡 Takeaway</label>
    <label class="filter-chip" id="chip-wifi"><input type="checkbox" id="filter-wifi" onchange="applyFiltersAndSort()">📶 WiFi</label>
    <label class="filter-chip" id="chip-parking"><input type="checkbox" id="filter-parking" onchange="applyFiltersAndSort()">🅿️ Parking</label>
    <label class="filter-chip" id="chip-live"><input type="checkbox" id="filter-live" onchange="applyFiltersAndSort()">🎵 Live music</label>
    <label class="filter-chip" id="chip-gluten"><input type="checkbox" id="filter-gluten" onchange="applyFiltersAndSort()">🌾 Gluten-free</label>
  </div>
</div>

<div class="main">
  <div class="error-msg" id="errorMsg"></div>
  <div class="loading" id="loading">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    Finding restaurants…
  </div>
  <div class="empty" id="emptyState">
    <div style="font-size:2.5rem;margin-bottom:.5rem">🔍</div>
    <h3>No matches found</h3>
    <p>Try removing filters or expanding the radius.</p>
  </div>

  <div id="heroEmpty" class="hero-empty">
    <h2>Where are you eating?</h2>
    <p>Search any NZ suburb, city, or street to find restaurants nearby.</p>
    <div class="hero-suggestions">
      <div class="hero-chip" onclick="quickSearch('Auckland CBD')">Auckland CBD</div>
      <div class="hero-chip" onclick="quickSearch('Queenstown')">Queenstown</div>
      <div class="hero-chip" onclick="quickSearch('Wellington')">Wellington</div>
      <div class="hero-chip" onclick="quickSearch('Christchurch')">Christchurch</div>
      <div class="hero-chip" onclick="quickSearch('Ponsonby')">Ponsonby</div>
      <div class="hero-chip" onclick="quickSearch('Tauranga')">Tauranga</div>
    </div>
  </div>

  <div id="resultsArea" style="display:none">
    <div class="status-bar">
      <div class="count" id="countLabel"></div>
    </div>
    <div id="resultsList"></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const FSQ_KEY = 'fsq31vTID5N1sD03H2oih6KwSQn4Yac/Zz9Kjsm0YzfwDhs=';

let allResults = [];
let suggestTimer = null;

// ── AUTOCOMPLETE ──────────────────────────────────────────────
const locationInput = document.getElementById('locationInput');
const suggestionsBox = document.getElementById('suggestions');

locationInput.addEventListener('input', function() {
  clearTimeout(suggestTimer);
  const val = this.value.trim();
  if (val.length < 2) { hideSuggestions(); return; }
  suggestTimer = setTimeout(() => fetchSuggestions(val), 300);
});

locationInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { hideSuggestions(); doSearch(); }
  if (e.key === 'Escape') hideSuggestions();
});

document.addEventListener('mousedown', e => {
  if (!e.target.closest('.field-location')) hideSuggestions();
});

async function fetchSuggestions(q) {
  try {
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=en&format=json`;
    const res = await fetch(url);
    const data = await res.json();
    const nzResults = (data.results || []).filter(r => r.country_code === 'NZ');
    renderSuggestions(nzResults);
  } catch(e) { hideSuggestions(); }
}

function renderSuggestions(items) {
  if (!items.length) { hideSuggestions(); return; }
  suggestionsBox.innerHTML = '';
  items.forEach(item => {
    const label = [item.name, item.admin1].filter(Boolean).join(', ');
    const d = document.createElement('div');
    d.className = 'suggestion-item';
    d.innerHTML = `<span class="s-icon">📍</span> ${label}`;
    d.addEventListener('mousedown', e => {
      e.preventDefault(); // prevent blur before click
      locationInput.value = label;
      hideSuggestions();
      doSearchWithCoords(item.latitude, item.longitude, label);
    });
    suggestionsBox.appendChild(d);
  });
  suggestionsBox.style.display = 'block';
}

function hideSuggestions() {
  suggestionsBox.style.display = 'none';
}

// ── GEOCODE + SEARCH ──────────────────────────────────────────
async function doSearch() {
  const q = locationInput.value.trim();
  if (!q) return;
  hideSuggestions();
  setLoading(true);
  clearError();
  try {
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=10&language=en&format=json`;
    const res = await fetch(url);
    const data = await res.json();
    const nz = (data.results || []).filter(r => r.country_code === 'NZ');
    if (!nz.length) {
      showError('Location not found in New Zealand. Try "Auckland CBD" or "Queenstown".');
      setLoading(false);
      return;
    }
    const best = nz[0];
    const label = [best.name, best.admin1].filter(Boolean).join(', ');
    locationInput.value = label;
    doSearchWithCoords(best.latitude, best.longitude, label);
  } catch(e) {
    showError('Could not geocode location. Check your connection and try again.');
    setLoading(false);
  }
}

function quickSearch(name) {
  locationInput.value = name;
  doSearch();
}

// ── GPS ───────────────────────────────────────────────────────
function useGPS() {
  const btn = document.getElementById('gpsBtn');
  if (!navigator.geolocation) {
    showError('GPS is not available on this browser.');
    return;
  }
  btn.textContent = '⏳ Locating…';
  btn.classList.add('loading-gps');
  btn.disabled = true;

  navigator.geolocation.getCurrentPosition(
    async pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      // Reverse geocode to get a place name
      try {
        const url = `https://geocoding-api.open-meteo.com/v1/search?name=&count=1&language=en&format=json`;
        // Use Nominatim reverse geocoding instead
        const revUrl = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=en`;
        const res = await fetch(revUrl);
        const data = await res.json();
        const addr = data.address || {};
        const label = addr.suburb || addr.city_district || addr.town || addr.city || addr.county || 'My location';
        locationInput.value = label;
      } catch(e) {
        locationInput.value = 'My location';
      }
      btn.textContent = '📍 GPS';
      btn.classList.remove('loading-gps');
      btn.disabled = false;
      doSearchWithCoords(lat, lng, locationInput.value);
    },
    err => {
      btn.textContent = '📍 GPS';
      btn.classList.remove('loading-gps');
      btn.disabled = false;
      const msg = err.code === 1
        ? 'Location access denied. Please allow location access in your browser settings.'
        : 'Could not get your location. Try typing a suburb instead.';
      showError(msg);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ── FOURSQUARE ────────────────────────────────────────────────
async function doSearchWithCoords(lat, lng, label) {
  setLoading(true);
  clearError();
  document.getElementById('heroEmpty').style.display = 'none';

  const radius = document.getElementById('radiusSelect').value;
  const cuisine = document.getElementById('cuisineSelect').value;

  const params = new URLSearchParams({
    ll: `${lat},${lng}`,
    radius,
    limit: 50,
    sort: 'DISTANCE',
    categories: cuisine || '13065,13032,13025,13064',
    fields: 'fsq_id,name,location,distance,rating,price,hours,features,categories'
  });

  try {
    const res = await fetch(`https://api.foursquare.com/v3/places/search?${params}`, {
      headers: {
        'Authorization': FSQ_KEY,
        'Accept': 'application/json',
        'X-Places-Api-Version': '2023-10-01'
      }
    });

    if (res.status === 401) { showError('Invalid Foursquare API key.'); setLoading(false); return; }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `Foursquare error ${res.status}`);
    }

    const data = await res.json();
    allResults = data.results || [];

    if (!allResults.length) {
      showEmpty();
    } else {
      applyFiltersAndSort();
    }
  } catch(e) {
    showError(`Could not load restaurants: ${e.message}`);
  }
  setLoading(false);
}

// ── FILTERS ───────────────────────────────────────────────────
function getFilters() {
  return {
    open:         document.getElementById('filter-open').checked,
    alcohol:      document.getElementById('filter-alcohol').checked,
    bar:          document.getElementById('filter-bar').checked,
    reservations: document.getElementById('filter-reservations').checked,
    vegan:        document.getElementById('filter-vegan').checked,
    vegetarian:   document.getElementById('filter-vegetarian').checked,
    outdoor:      document.getElementById('filter-outdoor').checked,
    delivery:     document.getElementById('filter-delivery').checked,
    takeaway:     document.getElementById('filter-takeaway').checked,
    wifi:         document.getElementById('filter-wifi').checked,
    parking:      document.getElementById('filter-parking').checked,
    live:         document.getElementById('filter-live').checked,
    gluten:       document.getElementById('filter-gluten').checked,
  };
}

function applyFiltersAndSort() {
  if (!allResults.length) return;
  const f = getFilters();
  const sort = document.getElementById('sortSelect').value;

  // Sync chip styles
  Object.keys(f).forEach(key => {
    document.getElementById(`chip-${key}`)?.classList.toggle('active', f[key]);
  });

  let list = allResults.filter(p => {
    const feat = p.features || {};
    const food = feat.food_and_drink || {};
    const svc  = feat.services || {};
    const am   = feat.amenities || {};
    if (f.open         && !isOpen(p))                          return false;
    if (f.alcohol      && !food.alcohol)                       return false;
    if (f.bar          && !food.bar)                           return false;
    if (f.reservations && !svc.dine_in?.reservations)          return false;
    if (f.vegan        && !food.menus?.has_vegan)              return false;
    if (f.vegetarian   && !food.menus?.has_vegetarian)         return false;
    if (f.outdoor      && !am.outdoor_seating)                 return false;
    if (f.delivery     && !svc.delivery)                       return false;
    if (f.takeaway     && !svc.takeout)                        return false;
    if (f.wifi         && !am.wifi)                            return false;
    if (f.parking      && !am.parking?.parking_available)      return false;
    if (f.live         && !am.live_music)                      return false;
    if (f.gluten       && !food.menus?.has_gluten_free)        return false;
    return true;
  });

  list.sort((a, b) => {
    if (sort === 'distance') return (a.distance||0) - (b.distance||0);
    if (sort === 'rating')   return (b.rating||0)   - (a.rating||0);
    if (sort === 'name')     return (a.name||'').localeCompare(b.name||'');
    return 0;
  });

  renderResults(list);
}

// ── HELPERS ───────────────────────────────────────────────────
function isOpen(p) { return p.hours?.open_now === true; }

function fmtDist(m) {
  if (m == null) return '';
  return m < 1000 ? `${m}m` : `${(m/1000).toFixed(1)}km`;
}

function priceStr(n) {
  return n ? ['','$','$$','$$$','$$$$'][n] || '' : '';
}

function ratingCls(r) {
  if (!r) return 'none';
  if (r >= 8) return 'high';
  if (r >= 6) return 'mid';
  return 'low';
}

function fmtAddr(loc) {
  if (!loc) return '';
  return [loc.address, loc.locality].filter(Boolean).join(', ');
}

// ── RENDER ────────────────────────────────────────────────────
function renderResults(places) {
  document.getElementById('heroEmpty').style.display = 'none';
  document.getElementById('resultsArea').style.display = 'block';
  document.getElementById('emptyState').classList.remove('visible');

  const f = getFilters();
  const active = Object.values(f).filter(Boolean).length;

  if (!places.length) {
    showEmpty();
    document.getElementById('countLabel').textContent = '';
    return;
  }

  document.getElementById('countLabel').innerHTML =
    `<strong>${places.length}</strong> place${places.length !== 1 ? 's' : ''} found` +
    (active ? ` &middot; ${active} filter${active > 1 ? 's' : ''} active` : '');

  document.getElementById('resultsList').innerHTML = places.map((p, i) => {
    const feat = p.features || {};
    const food = feat.food_and_drink || {};
    const svc  = feat.services || {};
    const am   = feat.amenities || {};

    // Build tags
    const tags = [];
    if (isOpen(p))                       tags.push(['tag-open',       '✅ Open now']);
    else if (p.hours)                    tags.push(['tag-closed',     '🔴 Closed']);
    const pr = priceStr(p.price);
    if (pr)                              tags.push(['tag-price',      pr]);
    if (food.alcohol)                    tags.push(['tag-alcohol',    '🍷 Alcohol']);
    if (food.bar)                        tags.push(['tag-bar',        '🍺 Bar']);
    if (food.menus?.has_vegan)           tags.push(['tag-vegan',      '🌱 Vegan']);
    if (food.menus?.has_vegetarian)      tags.push(['tag-vegetarian', '🥦 Vegetarian']);
    if (food.menus?.has_gluten_free)     tags.push(['tag-gluten',     '🌾 Gluten-free']);
    if (svc.dine_in?.reservations)       tags.push(['tag-reserve',    '📅 Reservations']);
    if (svc.delivery)                    tags.push(['tag-delivery',   '🛵 Delivery']);
    if (svc.takeout)                     tags.push(['tag-takeaway',   '🥡 Takeaway']);
    if (am.outdoor_seating)              tags.push(['tag-outdoor',    '🌿 Outdoor']);
    if (am.wifi)                         tags.push(['tag-wifi',       '📶 WiFi']);
    if (am.parking?.parking_available)   tags.push(['tag-parking',    '🅿️ Parking']);
    if (am.live_music)                   tags.push(['tag-live',       '🎵 Live music']);

    const r = p.rating;
    const ratingHTML = r
      ? `<span class="card-rating ${ratingCls(r)}">★ ${r.toFixed(1)}</span>`
      : `<span class="card-rating none">No rating</span>`;

    const cat = p.categories?.[0]?.name || '';
    const addr = fmtAddr(p.location);

    return `<a class="restaurant-card" href="https://foursquare.com/v/${p.fsq_id}" target="_blank" rel="noopener">
      <div class="card-rank">${i + 1}</div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">${p.name}</div>
          ${ratingHTML}
        </div>
        <div class="card-meta">
          ${cat ? `<span>${cat}</span>` : ''}
          ${cat && addr ? '<span class="sep">·</span>' : ''}
          ${addr ? `<span>${addr}</span>` : ''}
        </div>
        ${tags.length ? `<div class="card-tags">${tags.map(([cls, txt]) => `<span class="tag ${cls}">${txt}</span>`).join('')}</div>` : ''}
      </div>
      <div class="card-dist">${fmtDist(p.distance)}</div>
    </a>`;
  }).join('');
}

// ── UI STATE ──────────────────────────────────────────────────
function setLoading(v) {
  document.getElementById('loading').classList.toggle('visible', v);
  document.getElementById('searchBtn').disabled = v;
  if (v) {
    document.getElementById('resultsArea').style.display = 'none';
    document.getElementById('emptyState').classList.remove('visible');
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function clearError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

function showEmpty() {
  document.getElementById('emptyState').classList.add('visible');
  document.getElementById('resultsArea').style.display = 'block';
  document.getElementById('resultsList').innerHTML = '';
}
</script>
